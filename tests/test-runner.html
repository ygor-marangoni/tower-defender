<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Defender - Test Runner</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071019;
      --panel: #0e1b2a;
      --pass: #41f2a6;
      --fail: #ff5f7a;
      --text: #e8f6ff;
      --muted: #8ca6bd;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #12324f, var(--bg) 42%);
      color: var(--text);
      font-family: Consolas, "Courier New", monospace;
      padding: 32px;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      background: rgba(14, 27, 42, 0.88);
      border: 1px solid rgba(110, 220, 255, 0.18);
      border-radius: 18px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .summary {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .test {
      border-left: 4px solid var(--muted);
      padding: 10px 12px;
      margin: 10px 0;
      background: rgba(255, 255, 255, 0.035);
      border-radius: 8px;
    }

    .test.pass {
      border-color: var(--pass);
    }

    .test.fail {
      border-color: var(--fail);
    }

    .status-pass {
      color: var(--pass);
      font-weight: 700;
    }

    .status-fail {
      color: var(--fail);
      font-weight: 700;
    }

    pre {
      white-space: pre-wrap;
      color: #ffd1d9;
      margin: 8px 0 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Tower Defender Test Runner</h1>
    <p class="summary" id="summary">Executando testes...</p>
    <section id="results"></section>
  </main>

  <script src="../src/utils.js"></script>
  <script src="../src/config.js"></script>
  <script src="../src/theme.js"></script>
  <script src="../src/path.js"></script>
  <script src="../src/collision.js"></script>
  <script src="../src/enemy.js"></script>
  <script src="../src/projectile.js"></script>
  <script src="../src/tower.js"></script>
  <script src="../src/economy.js"></script>
  <script src="../src/wave.js"></script>
  <script src="../src/storage.js"></script>
  <script src="../src/game.js"></script>

  <script src="./test-utils.js"></script>
  <script src="./theme.test.js"></script>
  <script src="./enemy.test.js"></script>
  <script src="./tower.test.js"></script>
  <script src="./projectile.test.js"></script>
  <script src="./economy.test.js"></script>
  <script src="./wave.test.js"></script>
  <script src="./storage.test.js"></script>
  <script src="./collision.test.js"></script>
  <script src="./game-theme.test.js"></script>
  <script>
    window.TestRunner.render(
      document.getElementById('summary'),
      document.getElementById('results')
    );
  </script>
</body>
</html>
